<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday, My Love</title>
    <link rel="stylesheet" href="./styles.css?v=refine11" />
  </head>
  <body>
    <main class="card-world" aria-live="polite">
      <section class="envelope" id="greetingCard">
        <div class="envelope__shadow"></div>
        <button class="greeting-card" type="button" aria-label="打开生日贺卡">
          <span class="greeting-card__front">
            <span class="cover-cake" aria-hidden="true">
              <span class="cover-cake__plate"></span>
              <span class="cover-cake__base"></span>
              <span class="cover-cake__cream"></span>
              <span class="cover-cake__top"></span>
              <span class="cover-cake__candle"></span>
              <span class="cover-cake__flame"></span>
            </span>
            <span class="greeting-card__title">Happy Birthday</span>
            <span class="greeting-card__name">TOUCH TO OPEN · CLICK TO EXPLORE</span>
          </span>
          <span class="greeting-card__inside">
            <span>Welcome home</span>
            <small>to our little Acton room</small>
          </span>
        </button>
      </section>

      <section class="opening-intro" id="openingIntro" aria-label="开场白">
        <div class="opening-intro__copy" id="openingIntroCopy"></div>
        <button class="opening-intro__enter" id="openingIntroEnter" type="button">ENTER</button>
      </section>

      <section class="scene-shell" id="sceneShell" aria-label="生日客厅场景">
        <div class="topbar">
          <button class="icon-button" id="resetView" type="button" aria-label="重置视角" title="重置视角">
            <span aria-hidden="true">↺</span>
          </button>
          <button class="icon-button" id="bgmToggle" type="button" aria-label="切换背景音乐" title="BGM">
            <span aria-hidden="true">♪</span>
          </button>
          <div class="title-lockup">
            <span>Our Acton Room</span>
            <small>Happy Birthday, my love</small>
          </div>
        </div>

        <div class="scene" id="scene">
          <canvas id="roomCanvas" aria-label="3D 微缩客厅"></canvas>
          <div class="hotspot-layer" id="hotspotLayer" aria-label="可点击物件"></div>
          <div class="exploration-progress" id="explorationProgress" aria-live="polite">
            <span id="explorationProgressCount">0/7</span>
          </div>
          <div class="scene-hint">拖动旋转视角</div>
        </div>
      </section>
    </main>

    <dialog class="memory-dialog" id="memoryDialog">
      <button class="dialog-close" id="closeDialog" type="button" aria-label="关闭">×</button>
      <div class="memory-copy">
        <p id="memoryKicker"></p>
        <h2 id="memoryTitle"></h2>
        <p id="memoryText"></p>
      </div>
      <div class="memory-gallery" id="memoryGallery"></div>
    </dialog>

    <audio id="bgm" src="./红-告五人%23igR8V.mp3" loop preload="auto"></audio>
    <script src="./app.js?v=refine11"></script>
  </body>
</html>
